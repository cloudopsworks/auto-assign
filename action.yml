name: 'Auto Assign Action'
description: 'Add reviewers to pull requests and assignees to pull requests or issues.'
author: 'Kentaro Matsushita'
inputs:
  repo-token:
    description: 'GitHub token. Requires contents: read plus pull-requests: write for reviewers and issues: write for assignees.'
    default: ${{ github.token }}
    required: false
  configuration-path:
    description: 'Path to the auto-assign configuration file.'
    default: '.github/auto_assign.yml'
    required: false
runs:
  using: 'node24'
  main: 'dist/index.js'
branding:
  icon: 'user-plus'
  color: 'blue'
